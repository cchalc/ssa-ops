# Deploy and Configure Lakebase Autoscaling
# Triggered on push to main branch

name: Deploy Lakebase

on:
  push:
    branches: [main]
    paths:
      - 'databricks.yml'
      - 'infra/resources/lakebase.yml'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  deploy-lakebase:
    name: Deploy Lakebase Project
    runs-on: ubuntu-latest
    outputs:
      project_name: ${{ steps.vars.outputs.project_name }}
      database_name: ${{ steps.vars.outputs.database_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Set deployment variables
        id: vars
        run: |
          TARGET="${{ github.event.inputs.target || 'dev' }}"
          case "$TARGET" in
            dev)
              echo "project_name=ssa-ops-dev" >> $GITHUB_OUTPUT
              echo "database_name=ssa_ops_dev" >> $GITHUB_OUTPUT
              ;;
            staging)
              echo "project_name=ssa-ops-staging" >> $GITHUB_OUTPUT
              echo "database_name=ssa_ops_staging" >> $GITHUB_OUTPUT
              ;;
            prod)
              echo "project_name=ssa-ops" >> $GITHUB_OUTPUT
              echo "database_name=ssa_ops" >> $GITHUB_OUTPUT
              ;;
          esac
          echo "target=$TARGET" >> $GITHUB_OUTPUT

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh
          databricks --version

      - name: Deploy Lakebase bundle
        run: |
          databricks bundle deploy -t ${{ steps.vars.outputs.target }}

  configure-lakebase:
    name: Configure Lakebase Project
    runs-on: ubuntu-latest
    needs: deploy-lakebase
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Run post-deploy configuration
        env:
          LAKEBASE_PROJECT_NAME: ${{ needs.deploy-lakebase.outputs.project_name }}
          DATABASE_NAME: ${{ needs.deploy-lakebase.outputs.database_name }}
          DEVELOPERS_GROUP: "ssa-ops-developers"
        run: |
          chmod +x scripts/post_deploy.sh
          ./scripts/post_deploy.sh
