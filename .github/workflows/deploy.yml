# Deploy Databricks infrastructure and app
# Triggered on push to main or manual dispatch

name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'infra/**'
      - 'src/**'
      - 'databricks.yml'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - prod

jobs:
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    outputs:
      secrets_configured: ${{ steps.check-secrets.outputs.configured }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if Databricks secrets are configured
        id: check-secrets
        run: |
          if [ -n "${{ secrets.DATABRICKS_HOST }}" ] && [ -n "${{ secrets.DATABRICKS_TOKEN }}" ]; then
            echo "configured=true" >> $GITHUB_OUTPUT
          else
            echo "configured=false" >> $GITHUB_OUTPUT
            echo "::warning::Databricks secrets not configured. Set DATABRICKS_HOST and DATABRICKS_TOKEN in repository secrets."
          fi

      - name: Install Databricks CLI
        if: steps.check-secrets.outputs.configured == 'true'
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        if: steps.check-secrets.outputs.configured == 'true'
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle validate -t ${{ github.event.inputs.target || 'dev' }}

  deploy-infra:
    name: Deploy Infrastructure
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.validate.outputs.secrets_configured == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy Lakebase
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle deploy -t ${{ github.event.inputs.target || 'dev' }} --auto-approve

  build-app:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: warn

  deploy-app:
    name: Deploy App
    needs: [deploy-infra, build-app]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && needs.validate.outputs.secrets_configured == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy App
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
        run: |
          databricks bundle run ssa_ops_app -t ${{ github.event.inputs.target || 'dev' }}

  test-python:
    name: Test Python Tools
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup Python
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --no-build-isolation

      - name: Run tests
        run: uv run pytest -v || echo "No tests found yet"
        continue-on-error: true
