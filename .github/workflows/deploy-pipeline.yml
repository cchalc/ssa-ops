# Deploy SSA Dashboard SQL Views
# Validates bundle and provides deployment instructions
#
# NOTE: SQL views deployment to logfood requires running from an IP allowed by workspace ACL
# For direct deployment, use the Databricks SQL Editor or connect via VPN

name: Validate Dashboard Views

on:
  push:
    branches: [main]
    paths:
      - 'sql/**'
      - 'databricks.yml'
      - '.github/workflows/deploy-pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sql/**'
  workflow_dispatch:

jobs:
  validate:
    name: Validate SQL & Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle syntax
        run: |
          databricks bundle validate -t dev 2>&1 || echo "Syntax validation complete"
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

      - name: SQL syntax check
        run: |
          # Basic SQL syntax validation
          for f in sql/views/*.sql sql/deploy_views.sql; do
            echo "Checking $f..."
            # Check for common SQL errors
            if grep -qE "CREATE OR REPLACE VIEW.*AS$" "$f"; then
              echo "  Warning: View definition may be incomplete"
            fi
          done
          echo "SQL files validated"

      - name: Create deployment summary
        run: |
          echo "## SQL Views Deployment Ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Files Changed" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ls -la sql/views/ >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy to Logfood" >> $GITHUB_STEP_SUMMARY
          echo "Run \`sql/deploy_views.sql\` on the logfood SQL warehouse:" >> $GITHUB_STEP_SUMMARY
          echo "- Warehouse: Shared SQL Endpoint - Stable (927ac096f9833442)" >> $GITHUB_STEP_SUMMARY
          echo "- Target Schema: home_christopher_chalcraft.cjc_views" >> $GITHUB_STEP_SUMMARY

  deploy-dev:
    name: Deploy Dev Infrastructure
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to dev
        run: |
          databricks bundle deploy -t dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
