# SSA Dashboard - CI Pipeline (Validation Only)
# Deployment is done locally via `just deploy-dev` due to workspace IP ACL restrictions
#
# Local deployment commands:
#   just deploy-dev      # Deploy to fevm-cjc dev
#   just deploy-views    # Instructions for logfood SQL views
#   just sync-all        # Run full data sync pipeline

name: Validate SSA Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'sql/**'
      - 'src/**'
      - 'infra/**'
      - 'scripts/**'
      - 'pipelines/**'
      - 'databricks.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    name: Validate Bundle & SQL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle syntax
        run: |
          # Syntax-only validation (no API calls)
          databricks bundle validate -t dev 2>&1 || true
        env:
          DATABRICKS_HOST: https://example.cloud.databricks.com
          DATABRICKS_TOKEN: dapi_syntax_check_only

      - name: Check SQL files
        run: |
          echo "### SQL Files" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          find sql -name "*.sql" -type f | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: Deployment reminder
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deploy Locally" >> $GITHUB_STEP_SUMMARY
          echo "Workspaces have IP ACL restrictions. Deploy using:" >> $GITHUB_STEP_SUMMARY
          echo '```bash' >> $GITHUB_STEP_SUMMARY
          echo "just deploy-dev    # fevm-cjc infrastructure" >> $GITHUB_STEP_SUMMARY
          echo "just deploy-views  # logfood SQL views" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  build-app:
    name: Build App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm check
        continue-on-error: true

      - name: Build
        run: pnpm build
        continue-on-error: true

  test-python:
    name: Test Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Setup Python
        run: uv python install 3.12

      - name: Lint
        run: uv run ruff check . || true
        continue-on-error: true
