# Deploy SSA Dashboard SQL Views
# Validates and deploys SQL views using Databricks Asset Bundles
#
# IMPORTANT: SQL views must be deployed to logfood workspace (has stitch.salesforce access)
# Configure LOGFOOD_HOST and LOGFOOD_TOKEN secrets for production use

name: Deploy Dashboard Views

on:
  push:
    branches: [main]
    paths:
      - 'sql/**'
      - 'infra/resources/pipelines.yml'
      - 'databricks.yml'
      - '.github/workflows/deploy-pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sql/**'
      - 'infra/resources/pipelines.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'logfood'
        type: choice
        options:
          - logfood
          - dev
          - staging
          - prod
      run_job:
        description: 'Run views deployment job after deploy'
        required: false
        default: false
        type: boolean

jobs:
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle (dev)
        run: |
          databricks bundle validate -t dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  deploy-logfood:
    name: Deploy to Logfood
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'logfood'
    environment: logfood
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to logfood
        run: |
          databricks bundle deploy -t logfood
        env:
          DATABRICKS_HOST: ${{ secrets.LOGFOOD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.LOGFOOD_TOKEN }}

      - name: Run views deployment job
        if: github.event.inputs.run_job == 'true'
        run: |
          databricks bundle run -t logfood ssa_dashboard_deploy_views
        env:
          DATABRICKS_HOST: ${{ secrets.LOGFOOD_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.LOGFOOD_TOKEN }}

  deploy-dev:
    name: Deploy to Dev (App Infrastructure)
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle to dev
        run: |
          databricks bundle deploy -t dev
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [validate]
    if: failure()
    steps:
      - name: Create failure summary
        run: |
          echo "## Views Deployment Failed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Check the workflow logs for details." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
