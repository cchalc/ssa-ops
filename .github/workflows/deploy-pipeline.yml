# SSA Dashboard - CI/CD Pipeline
# Validates on PRs, deploys to dev on push to main
#
# Deployment targets:
#   - dev: Auto-deploy on push to main
#   - staging/prod: Manual workflow_dispatch

name: Deploy SSA Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'sql/**'
      - 'src/**'
      - 'infra/**'
      - 'scripts/**'
      - 'pipelines/**'
      - 'databricks.yml'
      - 'pyproject.toml'
      - '.github/workflows/deploy-pipeline.yml'
  pull_request:
    branches: [main]
    paths:
      - 'sql/**'
      - 'src/**'
      - 'infra/**'
      - 'scripts/**'
      - 'pipelines/**'
      - 'databricks.yml'
  workflow_dispatch:
    inputs:
      target:
        description: 'Deployment target'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
  DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}

jobs:
  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Validate bundle
        run: databricks bundle validate -t dev

      - name: SQL syntax check
        run: |
          echo "Checking SQL files..."
          for f in sql/**/*.sql; do
            if [ -f "$f" ]; then
              echo "  ✓ $f"
            fi
          done

  deploy-dev:
    name: Deploy to Dev
    runs-on: ubuntu-latest
    needs: validate
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'dev')
    environment: development
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle
        run: databricks bundle deploy -t dev

      - name: Create deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** dev" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Deployed Resources" >> $GITHUB_STEP_SUMMARY
          databricks bundle summary -t dev 2>/dev/null | head -40 >> $GITHUB_STEP_SUMMARY || true

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'staging'
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle
        run: databricks bundle deploy -t staging

      - name: Create deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** staging" >> $GITHUB_STEP_SUMMARY
          databricks bundle summary -t staging 2>/dev/null | head -40 >> $GITHUB_STEP_SUMMARY || true

  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install Databricks CLI
        run: |
          curl -fsSL https://raw.githubusercontent.com/databricks/setup-cli/main/install.sh | sh

      - name: Deploy bundle
        run: databricks bundle deploy -t prod

      - name: Create deployment summary
        run: |
          echo "## Production Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "**Target:** prod" >> $GITHUB_STEP_SUMMARY
          databricks bundle summary -t prod 2>/dev/null | head -40 >> $GITHUB_STEP_SUMMARY || true
