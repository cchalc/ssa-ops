# Databricks App resource
# TanStack Start app with Lakebase backend

resources:
  apps:
    cjc_ssa_ops_app:
      name: cjc-ssa-ops-${bundle.target}
      source_code_path: ../../dist  # Built TanStack Start app (relative to infra/resources/)
      description: "Local-first data app with Databricks backend"

      # Grant app access to Lakebase
      resources:
        - name: "app-database"
          description: "Lakebase database for app data sync"
          database:
            database_name: ${var.database_name}
            instance_name: ${resources.database_instances.cjc_ssa_ops_instance.name}
            permission: "CAN_CONNECT_AND_CREATE"
