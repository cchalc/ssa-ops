# Lakebase (OLTP Postgres) infrastructure
# Provisions database instance and Unity Catalog integration

resources:
  # Lakebase instance
  database_instances:
    ssa_ops_instance:
      name: ssa-ops-${bundle.target}
      capacity: ${var.database_capacity}

  # Unity Catalog registration for Lakebase
  database_catalogs:
    ssa_ops_catalog:
      database_instance_name: ${resources.database_instances.ssa_ops_instance.name}
      database_name: ${var.database_name}
      name: ${var.catalog_name}
      create_database_if_not_exists: true
