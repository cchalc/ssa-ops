# SSA Dashboard Sync Jobs (fevm-cjc workspace)
# Jobs that run on fevm-cjc after data is exported from logfood
#
# NOTE: The export job (logfood → Delta) is deployed separately to logfood workspace
#       See: databricks-logfood.yml and infra/resources/logfood_jobs.yml

resources:
  jobs:
    # Job: Sync from Delta tables to Lakebase
    ssa_dashboard_sync_to_lakebase:
      name: "[${bundle.target}] SSA Dashboard - Sync to Lakebase"
      description: "Sync Delta tables to Lakebase PostgreSQL for app access"

      # Daily schedule at 7:00 AM UTC (after Delta export completes on logfood)
      schedule:
        quartz_cron_expression: "0 0 7 * * ?"
        timezone_id: "UTC"
        pause_status: "PAUSED"  # Enable after initial validation

      tasks:
        - task_key: "sync_to_lakebase"
          spark_python_task:
            python_file: ${workspace.file_path}/src/jobs/sync_to_lakebase.py
          new_cluster:
            spark_version: "14.3.x-scala2.12"
            node_type_id: "i3.xlarge"
            num_workers: 0
            spark_conf:
              spark.master: "local[*]"
              spark.databricks.cluster.profile: "singleNode"
            custom_tags:
              ResourceClass: "SingleNode"

      email_notifications:
        on_failure:
          - "christopher.chalcraft@databricks.com"

      tags:
        team: "ssa-can-bu"
        domain: "analytics"
        job_type: "data-sync"
        sync_tier: "delta-to-lakebase"

    # Job: Data Validation
    ssa_dashboard_validate_data:
      name: "[${bundle.target}] SSA Dashboard - Validate Data"
      description: "Run data validation tests on Delta tables"

      # Weekly schedule on Monday at 8 AM UTC
      schedule:
        quartz_cron_expression: "0 0 8 ? * MON"
        timezone_id: "UTC"
        pause_status: "PAUSED"

      tasks:
        - task_key: "validate_delta_tables"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/sql/tests/02_validate_delta_tables.sql

        - task_key: "validate_cross_tier"
          sql_task:
            warehouse_id: ${var.warehouse_id}
            file:
              path: ${workspace.file_path}/sql/tests/03_validate_cross_tier.sql
          depends_on:
            - task_key: "validate_delta_tables"

      email_notifications:
        on_failure:
          - "christopher.chalcraft@databricks.com"
        on_success:
          - "christopher.chalcraft@databricks.com"

      tags:
        team: "ssa-can-bu"
        domain: "analytics"
        job_type: "data-validation"
