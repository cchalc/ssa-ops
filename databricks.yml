# Databricks Asset Bundle for ssa-ops
# Infrastructure as code for Lakebase + App deployment

bundle:
  name: ssa_ops

include:
  - infra/resources/database.yml
  # Uncomment after first build:
  # - infra/resources/app.yml

variables:
  # Database configuration
  database_capacity:
    description: "Lakebase compute capacity"
    default: "CU_1"

  database_name:
    description: "Logical database name"
    default: "ssa_ops_db"

  # Catalog for Unity Catalog integration
  catalog_name:
    description: "Unity Catalog name for Lakebase"
    default: "ssa_ops_catalog"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: fevm-cjc
    variables:
      database_capacity: "CU_1"
      database_name: "cjc_ssa_ops_dev"
      catalog_name: "cjc_ssa_ops_dev_catalog"

  prod:
    mode: production
    workspace:
      profile: fevm-cjc
    variables:
      database_capacity: "CU_2"
      database_name: "cjc_ssa_ops_prod"
      catalog_name: "cjc_ssa_ops_catalog"
