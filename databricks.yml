# Databricks Asset Bundle for ssa-ops
# Infrastructure as code for Lakebase Autoscaling + App deployment

bundle:
  name: ssa_ops

sync:
  include:
    - src/sql/**
    - src/jobs/**
    - sql/**
    - pipelines/**

# Lakebase + App infrastructure (fevm-cjc workspace)
# NOTE: Export job is in bundles/logfood/ (separate bundle for logfood workspace)
include:
  - infra/resources/lakebase.yml
  - infra/resources/jobs.yml
  - infra/resources/pipelines.yml
  - infra/resources/sync_jobs.yml
  # NOTE: synced_tables.yml requires CREATE CATALOG permission on metastore
  # - infra/resources/synced_tables.yml
  # Uncomment after first build:
  # - infra/resources/app.yml

# For SQL views deployment, use databricks-logfood.yml instead

variables:
  # Unity Catalog namespace
  catalog:
    description: "Unity Catalog catalog name"
    default: "cjc_aws_workspace_catalog"

  schema:
    description: "Unity Catalog schema name"
    default: "ssa_ops"

  # SQL Warehouse for running queries (local workspace)
  warehouse_id:
    description: "SQL Warehouse ID for local workspace"

  # SQL Warehouse for cross-catalog queries (logfood workspace)
  logfood_warehouse_id:
    description: "SQL Warehouse ID with access to stitch.salesforce"
    default: "927ac096f9833442"  # Shared SQL Endpoint - Stable on logfood

  # Lakebase Autoscaling configuration
  lakebase_project:
    description: "Lakebase Autoscaling project name"
    default: "ssa-ops"

  database_name:
    description: "Logical database name in Lakebase"
    default: "ssa_ops"

  # Compute scaling
  autoscaling_min_cu:
    description: "Minimum compute units"
    default: "0.5"

  autoscaling_max_cu:
    description: "Maximum compute units"
    default: "2"

  # History retention for point-in-time recovery (seconds)
  history_retention:
    description: "History retention duration in seconds (14 days = 1209600)"
    default: "1209600"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: fevm-cjc
    variables:
      catalog: "cjc_aws_workspace_catalog"
      schema: "ssa_ops_dev"
      warehouse_id: "751fe324525584e5"  # Serverless Starter Warehouse
      lakebase_project: "ssa-ops-dev"
      database_name: "ssa_ops_dev"
      autoscaling_min_cu: "0.5"
      autoscaling_max_cu: "2"

  # NOTE: Logfood export job is in bundles/logfood/ (separate bundle)

  staging:
    mode: development
    workspace:
      profile: fevm-cjc
    variables:
      catalog: "cjc_aws_workspace_catalog"
      schema: "ssa_ops_staging"
      warehouse_id: "751fe324525584e5"
      lakebase_project: "ssa-ops-staging"
      database_name: "ssa_ops_staging"
      autoscaling_min_cu: "0.5"
      autoscaling_max_cu: "4"

  prod:
    mode: production
    workspace:
      profile: fevm-cjc
    variables:
      catalog: "cjc_aws_workspace_catalog"
      schema: "ssa_ops"
      warehouse_id: "751fe324525584e5"
      lakebase_project: "ssa-ops"
      database_name: "ssa_ops"
      autoscaling_min_cu: "0.5"
      autoscaling_max_cu: "8"
      history_retention: "2592000"  # 30 days for prod
